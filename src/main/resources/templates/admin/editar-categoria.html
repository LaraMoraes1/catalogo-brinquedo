<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Editar Categoria')}"></head>
<body>
<header th:replace="~{fragments/layout :: header(activePage='admin')}"></header>
<main class="main-content">
    <div class="breadcrumb">
        <a th:href="@{/admin}">Administracao</a> &rsaquo;
        <a th:href="@{/admin/categorias}">Categorias</a> &rsaquo;
        <span th:text="${categoria.nome}">Categoria</span>
    </div>
    <div class="form-card">
        <h1 th:text="'Editar: ' + ${categoria.nome}">Editar Categoria</h1>
        <form th:action="@{/admin/categorias/editar/{id}(id=${categoria.id})}"
              method="post"
              enctype="multipart/form-data">

            <div class="form-group">
                <label>IMAGEM ATUAL</label>
                <div>
                    <img th:if="${categoria.imagem != null}"
                         th:src="@{/imagens/{img}(img=${categoria.imagem})}"
                         style="max-height:120px; border-radius:10px; object-fit:contain;"/>
                    <span th:unless="${categoria.imagem != null}">Nenhuma imagem cadastrada</span>
                </div>
            </div>

            <div class="form-group">
                <label for="arquivoImagem">NOVA IMAGEM</label>
                <input type="file" id="arquivoImagem" name="arquivoImagem" accept="image/*"/>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">SALVAR</button>
                <a th:href="@{/admin/categorias}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:src="@{/static/js/main.js}"></script>
</body>
</html>
