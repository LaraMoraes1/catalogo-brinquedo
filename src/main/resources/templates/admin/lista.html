<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Administracao')}"></head>
<body>
<header th:replace="~{fragments/layout :: header(activePage='admin')}"></header>
<main class="main-content">
    <div class="admin-header">
        <h1>Administracao &rsaquo; Brinquedos</h1>
        <a th:href="@{/admin/novo}" class="btn btn-primary">+ Novo Brinquedo <a th:href="@{/admin/categorias}" class="btn btn-secondary">Gerenciar Categorias</a>
            <form method="post" th:action="@{/logout}" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-secondary">Sair</button>
            </form></a>
    </div>

    <div class="alert alert-success" th:if="${sucesso}" th:text="${sucesso}"></div>
    <div class="alert alert-error" th:if="${erro}" th:text="${erro}"></div>

    <div class="admin-table-wrap">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Codigo</th>
                    <th>Descricao</th>
                    <th>Categoria</th>
                    <th>Valor</th>
                    <th>Destaque</th>
                    <th>Controles</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="b : ${brinquedos}">
                    <td th:text="${b.codigo}"></td>
                    <td th:text="${b.descricao}"></td>
                    <td th:text="${b.categoria.nome}"></td>
                    <td th:text="'R$ ' + ${#numbers.formatDecimal(b.valor, 1, 'POINT', 2, 'COMMA')}"></td>
                    <td th:text="${b.destaque} ? 'Sim' : 'Nao'"></td>
                    <td class="actions">
                        <a th:href="@{/admin/editar/{id}(id=${b.id})}" class="link-edit">Editar</a>
                        <button class="link-delete"
                                th:attr="onclick='confirmarExclusao(' + ${b.id} + ', \'' + ${b.descricao} + '\')'">Excluir</button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(brinquedos)}">
                    <td colspan="6" style="text-align:center;padding:2rem;color:#636e72;">Nenhum brinquedo cadastrado.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Modal de confirmacao de exclusao -->
    <div id="modal-exclusao" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h2>Exclusao de Produto</h2>
            <p id="modal-msg">Confirma a exclusao do produto escolhido?</p>
            <div class="modal-actions">
                <form id="form-exclusao" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger">SIM</button>
                </form>
                <button onclick="fecharModal()" class="btn btn-secondary">NAO</button>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:src="@{/static/js/main.js}"></script>
</body>
</html>
