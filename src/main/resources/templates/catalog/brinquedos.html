<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Catalogo')}"></head>
<body>
<header th:replace="~{fragments/layout :: header(activePage='catalogo')}"></header>
<main class="main-content">
    <div class="breadcrumb">
        <a th:href="@{/}">Home</a> &rsaquo;
        <a th:href="@{/catalogo}">Catalogo</a> &rsaquo;
        <span th:text="${categoria.nome}">Categoria</span>
    </div>
    <div class="page-banner">
        <h1 th:text="${categoria.nome}">Categoria</h1>
    </div>
    <div class="product-grid" th:unless="${#lists.isEmpty(brinquedos)}">
        <div class="product-card" th:each="b : ${brinquedos}">
            <a th:href="@{/catalogo/brinquedo/{id}(id=${b.id})}">
                <div class="product-img-wrap">
                    <img th:if="${b.imagem != null}" th:src="@{/imagens/{img}(img=${b.imagem})}" th:alt="${b.descricao}"/>
                    <div th:unless="${b.imagem != null}" class="product-no-img">🧸</div>
                </div>
                <div class="product-info">
                    <h3 th:text="${b.descricao}">Descricao</h3>
                    <p class="price" th:text="'R$ ' + ${#numbers.formatDecimal(b.valor, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</p>
                </div>
            </a>
        </div>
    </div>
    <div th:if="${#lists.isEmpty(brinquedos)}" class="empty-state">
        <span>🎠</span><p>Nenhum brinquedo nesta categoria ainda.</p>
        <a th:href="@{/admin/novo}" class="btn btn-primary">Cadastrar brinquedo</a>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:src="@{/static/js/main.js}"></script>
</body>
</html>
