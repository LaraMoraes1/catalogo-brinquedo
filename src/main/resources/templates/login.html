<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body>
<header th:replace="~{fragments/layout :: header(activePage='')}"></header>
<main class="main-content">
    <div class="form-card" style="max-width:400px; margin: 3rem auto;">
        <h1>🔐 Login</h1>
        <div class="alert alert-error" th:if="${param.error}">
            Usuário ou senha incorretos!
        </div>
        <div class="alert alert-success" th:if="${param.logout}">
            Você saiu com sucesso!
        </div>
        <form method="post" th:action="@{/login}">
            <div class="form-group">
                <label for="username">USUÁRIO</label>
                <input type="text" id="username" name="username" placeholder="admin"/>
            </div>
            <div class="form-group">
                <label for="password">SENHA</label>
                <input type="password" id="password" name="password" placeholder="••••"/>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">ENTRAR</button>
            </div>
        </form>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
