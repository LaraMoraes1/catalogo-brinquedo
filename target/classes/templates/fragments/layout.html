<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' | BrinquedoShop'">BrinquedoShop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/static/css/style.css}"/>
</head>
<body>

<header class="site-header" th:fragment="header(activePage)">
    <div class="header-inner">
        <a th:href="@{/}" class="logo">
            <span class="logo-icon">🧸</span>
            <span class="logo-text">BrinquedoShop</span>
        </a>
        <nav class="main-nav">
            <a th:href="@{/}" th:classappend="${activePage == 'home'} ? ' active'">Home</a>
            <a th:href="@{/catalogo}" th:classappend="${activePage == 'catalogo'} ? ' active'">Catalogo</a>
            <a th:href="@{/admin}" th:classappend="${activePage == 'admin'} ? ' active'">Administracao</a>
            <a th:href="@{/sobre}" th:classappend="${activePage == 'sobre'} ? ' active'">Sobre a Equipe</a>
        </nav>
    </div>
</header>

<footer class="site-footer" th:fragment="footer">
    <p>2026 BrinquedoShop &mdash; Trabalho de Faculdade</p>
</footer>

</body>
</html>
